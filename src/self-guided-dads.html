<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Guided Dads — A Community Built by Dads, For Dads</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F2EA;
    --warm-brown: #3B2A1A;
    --rust: #C4581F;
    --amber: #E8A83E;
    --forest: #2D4A32;
    --light-rust: #F4E8DF;
    --mid: #8B6B4A;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--warm-brown);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    background: var(--forest);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 60px 80px 80px;
    position: relative;
    z-index: 2;
  }

  .hero-left::after {
    content: '';
    position: absolute;
    right: -60px;
    top: 0;
    bottom: 0;
    width: 120px;
    background: var(--forest);
    clip-path: polygon(0 0, 0 100%, 100% 100%);
    z-index: 1;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 28px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 5vw, 68px);
    font-weight: 900;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 28px;
  }

  .hero-title em {
    font-style: italic;
    color: var(--amber);
  }

  .hero-subtitle {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.7;
    color: rgba(247, 242, 234, 0.75);
    max-width: 400px;
    margin-bottom: 48px;
  }

  .stat-row {
    display: flex;
    gap: 40px;
    margin-top: 40px;
  }

  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--amber);
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(247, 242, 234, 0.5);
  }

  /* Signup form */
  .signup-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 380px;
  }

  .form-row { display: flex; gap: 10px; }

  .signup-form input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(247,242,234,0.2);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--cream);
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }

  .signup-form input::placeholder { color: rgba(247,242,234,0.35); }
  .signup-form input:focus { border-color: var(--amber); }

  .btn-join {
    background: var(--rust);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 16px 32px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .btn-join:hover { background: #a8471a; transform: translateY(-1px); }

  .form-note {
    font-size: 12px;
    color: rgba(247,242,234,0.35);
    line-height: 1.5;
  }

  /* Hero right */
  .hero-right {
    background: var(--light-rust);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 80px 80px 100px;
    position: relative;
  }

  .quote-card {
    background: white;
    border-radius: 8px;
    padding: 48px 44px;
    max-width: 420px;
    box-shadow: 0 24px 80px rgba(59,42,26,0.12);
    position: relative;
  }

  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 100px;
    line-height: 0.6;
    color: var(--amber);
    opacity: 0.3;
    display: block;
    margin-bottom: 20px;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    line-height: 1.6;
    color: var(--warm-brown);
    margin-bottom: 28px;
  }

  .quote-author {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--forest);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--amber);
    flex-shrink: 0;
  }

  .author-info { display: flex; flex-direction: column; gap: 2px; }
  .author-name { font-size: 14px; font-weight: 500; color: var(--warm-brown); }
  .author-role { font-size: 12px; color: var(--mid); }

  .floating-badge {
    position: absolute;
    bottom: -24px;
    right: -24px;
    background: var(--rust);
    color: white;
    border-radius: 50%;
    width: 96px;
    height: 96px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.3;
    box-shadow: 0 8px 24px rgba(196,88,31,0.35);
    animation: spin-slow
